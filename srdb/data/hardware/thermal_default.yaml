# Thermal Model — default 3-node profile
# Nodes: +X panel, -X panel, internal cavity
hardware_id: thermal_default
type: thermal_node
description: "Simple 3-node spacecraft thermal model"
vendor: generic
params:
  nodes:
    - id: panel_plus_x
      mass_kg: 0.5
      specific_heat_j_kg_k: 900.0   # aluminium
      area_m2: 0.01
      absorptivity: 0.9
      emissivity: 0.85
      initial_temp_degc: -20.0
    - id: panel_minus_x
      mass_kg: 0.5
      specific_heat_j_kg_k: 900.0
      area_m2: 0.01
      absorptivity: 0.1             # radiator surface
      emissivity: 0.85
      initial_temp_degc: -20.0
    - id: internal
      mass_kg: 1.0
      specific_heat_j_kg_k: 900.0
      area_m2: 0.0                  # no direct radiation
      absorptivity: 0.0
      emissivity: 0.0
      initial_temp_degc: 20.0
  solar_flux_w_m2: 1361.0           # solar constant
  stefan_boltzmann: 5.67e-8
  conductance_w_k:                  # inter-node conductances
    panel_plus_x_to_internal: 0.1
    panel_minus_x_to_internal: 0.1
