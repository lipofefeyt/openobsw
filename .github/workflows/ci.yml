name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc clang python3-pip
          pip install pydantic pyyaml --break-system-packages
          pip install -e srdb/ --break-system-packages

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  asan:
    name: ASAN / UBSAN (gcc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc clang python3-pip
          pip install pydantic pyyaml --break-system-packages
          pip install -e srdb/ --break-system-packages

      - name: Configure with sanitizers
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOBSW_ENABLE_ASAN=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ------------------------------------------------------------------ #
  # ZynqMP bare-metal binary — build and publish as workflow artifact  #
  # Runs on push to main only (not PRs) to avoid unnecessary builds    #
  # ------------------------------------------------------------------ #
  build-zynqmp:
    name: ZynqMP bare-metal binary
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3-pip wget
          pip install pydantic pyyaml --break-system-packages
          pip install -e srdb/ --break-system-packages

      - name: Install aarch64-none-elf toolchain
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.3.rel1/binrel/arm-gnu-toolchain-12.3.rel1-x86_64-aarch64-none-elf.tar.xz
          tar -xf arm-gnu-toolchain-12.3.rel1-x86_64-aarch64-none-elf.tar.xz -C /tmp
          echo "/tmp/arm-gnu-toolchain-12.3.rel1-x86_64-aarch64-none-elf/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: aarch64-none-elf-gcc --version

      - name: Configure ZynqMP bare-metal build
        run: |
          cmake -B build_zynqmp \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-none-elf.cmake \
            -DOBSW_BUILD_TESTS=OFF \
            -DOBSW_BUILD_SIM=OFF \
            -DOBSW_BUILD_ZYNQMP=ON \
            -G Ninja \
            -DPython3_EXECUTABLE=$(which python3)

      - name: Build ZynqMP binary
        run: |
          cmake --build build_zynqmp
          aarch64-none-elf-objcopy -O binary \
            build_zynqmp/obsw_zynqmp \
            build_zynqmp/obsw_zynqmp.bin
          ls -lh build_zynqmp/obsw_zynqmp.bin

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsw_zynqmp_bin
          path: build_zynqmp/obsw_zynqmp.bin
          retention-days: 30

  # ------------------------------------------------------------------ #
  # STM32H750 bare-metal binary — build and publish as artifact        #
  # ------------------------------------------------------------------ #
  build-stm32h7:
    name: STM32H750 bare-metal binary
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build python3-pip gcc-arm-none-eabi
          pip install pydantic pyyaml --break-system-packages
          pip install -e srdb/ --break-system-packages

      - name: Verify toolchain
        run: arm-none-eabi-gcc --version

      - name: Configure STM32H7 build
        run: |
          cmake -S targets/stm32h7 -B build_stm32h7 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$(pwd)/cmake/stm32h7-toolchain.cmake \
            -DPython3_EXECUTABLE=$(which python3) \
            -DOBSW_ROOT=$(pwd)

      - name: Build STM32H7 binary
        run: |
          cmake --build build_stm32h7 -j$(nproc)
          ls -lh build_stm32h7/obsw_stm32h7.bin

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsw_stm32h7_bin
          path: build_stm32h7/obsw_stm32h7.bin
          retention-days: 30